spring:
  application:
    name: tobyreminder

  # H2 Database
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

  # Disable data.sql in tests
  sql:
    init:
      mode: never
